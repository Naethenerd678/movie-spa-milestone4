<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie App</title>



  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Mustache -->
  <script src="https://unpkg.com/mustache@latest/mustache.min.js"></script>
  
  <!-- JS -->
  <script src="script.js"></script>  

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  
</head>
<body>

  <h1>Movie App</h1>
  
  
  
  <!-- Tab Navigation -->
  <div class="tab">
    <button class="tablinks" onclick="openTab(event, 'Search_Results');">Search Results</button>
    <button class="tablinks" onclick="openTab(event, 'Collections');">Collections</button>
  </div>

  <!-- Tab 1 Content -->
  <div id="Search_Results" class="tabcontent">
    <h3>Search Results</h3>
    <p>
       <!-- SEARCH -->
      <input type="text" id="searchInput" placeholder="Search movies...">
      <button id="searchBtn" onclick='searchButtonOnClick();'>Search</button>

      <!-- VIEW SWITCH -->
      <button id="gridBtn">Grid</button>
      <button id="listBtn">List</button>

      <!-- PAGINATION -->
      <div>
        <button id="prevBtn">Prev</button>
        <span id="pageInfo"></span>
        <button id="nextBtn">Next</button>
      </div>

      <!-- DETAILS -->
      <div id="details"></div>
      
      <!-- RESULTS -->
      <div id="results" class="grid-view"></div>


      <!-- MUSTACHE TEMPLATE -->
      <script id="movie-template" type="x-tmpl-mustache">
        <div class="movie-card" data-id="{{id}}">
          <img src="https://image.tmdb.org/t/p/w200{{poster_path}}" />
          <h3>{{title}}</h3>
          <p> {{vote_average}}</p>
        </div>
      </script>

      <script id="details-template" type="x-tmpl-mustache">
        <div>
          <h2>{{title}}</h2>
          <img src="https://image.tmdb.org/t/p/w300{{poster_path}}" />
          <p>{{overview}}</p>
        </div>
      </script>          
    </p>
  </div>

  <!-- Tab 2 Content -->
  <div id="Collections" class="tabcontent" style='display:none;'>
    <h3>Collections</h3>
    <p>
    
      <h1>Popular Movies</h1>
      <div id="movies" class="movie-grid"></div>

      <!-- Mustache Template -->
      <script id="collections-template" type="text/template">
          {{#results}}
          <div class="movie-card">
              <img src="https://image.tmdb.org/t/p/w300{{poster_path}}" alt="{{title}}">
              <h3>{{title}}</h3>
              <p>Rating: {{vote_average}}</p>
          </div>
          {{/results}}
      </script>
    
    </p>
  </div>

</body>
</html>

<script>
$(document).ready(function() {
    const apiUrl = `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=en-US&page=1`;

    $.ajax({
        url: apiUrl,
        method: 'GET',
        success: function(data) {
            // Get template and container
            const template = $('#collections-template').html();
            const container = $('#movies');
            
            // Render mustache
            const html = Mustache.render(template, data);
            container.html(html);
        },
        error: function(error) {
            console.error('Error fetching data:', error);
        }
    });
    
    
    
    
});
</script>
